name: cs224n
channels:
  - conda-forge
dependencies:
  - python=3.8
  - numpy<1.24 # gensim 3.8.3 is built against numpy 1.x; numpy 2.x breaks its C API
  - scipy<1.11 # scipy>=1.13 removed scipy.linalg.triu which gensim 3.8.3 imports
  - gensim=3.8.3 # last 3.x release: keeps .vocab / .word_vec used by the notebook
  - scikit-learn # reduce_to_k_dim uses sklearn.decomposition.TruncatedSVD
  - matplotlib # plot_embeddings
  - nltk # reuters corpus
  - notebook # jupyter notebook exploring_word_vectors.ipynb
  - ipykernel # register this env as a jupyter kernel
  - pip
  - tqdm
  - pip:
      - torch
